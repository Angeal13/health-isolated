# BIOKO HEALTH — Configuración de Nginx (reverse proxy)
# Instalación:
#   sudo cp deploy/nginx-bioko.conf /etc/nginx/sites-available/bioko-health
#   sudo ln -s /etc/nginx/sites-available/bioko-health /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: para la intranet usar certificados internos (mkcert o CA propia del
# Ministerio). Para el servidor central con dominio público, usar certbot.

upstream bioko_app {
    server 127.0.0.1:5000 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;
    # Redirigir todo a HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── Certificados — AJUSTAR RUTAS ──────────────────────────
    ssl_certificate     /etc/ssl/bioko/fullchain.pem;
    ssl_certificate_key /etc/ssl/bioko/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Cabeceras de seguridad ────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── Límites ───────────────────────────────────────────────
    client_max_body_size 10M;       # Fotos de pacientes
    client_body_timeout 30s;

    # ── Proxy a Gunicorn ──────────────────────────────────────
    location / {
        proxy_pass http://bioko_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Archivos estáticos (si se añaden) ─────────────────────
    location /static/ {
        alias /opt/bioko-health/app/static/;
        expires 7d;
        access_log off;
    }
}
